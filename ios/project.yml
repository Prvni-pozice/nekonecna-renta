name: NekonecnaRenta
options:
  bundleIdPrefix: com.prvnipozice
  deploymentTarget:
    iOS: "17.0"
  defaultConfig: Debug
  developmentRegion: en
settings:
  SWIFT_VERSION: "6.0"
targets:
  NekonecnaRenta:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - NekonecnaRenta
    settings:
      base:
        DEVELOPMENT_TEAM: 4NQ89N9F5J
        CODE_SIGN_STYLE: Automatic
        PRODUCT_BUNDLE_IDENTIFIER: com.prvnipozice.nekonecnarenta
        MARKETING_VERSION: "1.2"
        CURRENT_PROJECT_VERSION: "2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "Endless Annuity"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
    schemes:
      NekonecnaRenta:
        build:
          targets:
            NekonecnaRenta: all
        run:
          config: Debug
        test:
          config: Debug
          targets:
            - NekonecnaRentaTests
        release:
          config: Release
  NekonecnaRentaTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - NekonecnaRentaTests
    dependencies:
      - target: NekonecnaRenta
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.prvnipozice.nekonecnarenta.tests
