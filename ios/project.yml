name: NekonecnaRenta
options:
  bundleIdPrefix: cz.nazevfirmy
  deploymentTarget:
    iOS: "17.0"
  defaultConfig: Debug
settings:
  SWIFT_VERSION: "6.0"
targets:
  NekonecnaRenta:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - NekonecnaRenta
    info:
      path: NekonecnaRenta/Info.plist
      properties:
        CFBundleDisplayName: "Nekonečná renta"
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: cz.nazevfirmy.nekonecnarenta
      MARKETING_VERSION: "1.0"
      CURRENT_PROJECT_VERSION: "1"
    schemes:
      NekonecnaRenta:
        build:
          targets:
            NekonecnaRenta: all
        run:
          config: Debug
        test:
          config: Debug
          targets:
            - NekonecnaRentaTests
        release:
          config: Release
  NekonecnaRentaTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - NekonecnaRentaTests
    dependencies:
      - target: NekonecnaRenta
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: cz.nazevfirmy.nekonecnarenta.tests
